name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.10"
      - run: bun install --frozen-lockfile
      - name: Biome check
        run: bun run check
      - name: Astro build
        run: bun run build
